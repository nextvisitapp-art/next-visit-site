     identically everywhere - including as a favicon / <img>, where web fonts
     don't load. The glyphs are centred as a pair with a clean ~3px gap at the
     seam: the N and V must NOT overlap. If you need to change the icon, change
     brand/marks.jsx first and re-export per brand/marks.md. Do NOT redraw it
     in isolation here. -->
